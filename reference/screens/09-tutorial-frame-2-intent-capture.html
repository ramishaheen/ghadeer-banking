<!DOCTYPE html>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .orb-glow {
      box-shadow: 0 0 20px 5px rgba(255, 107, 0, 0.3);
    }
    .waveform-bar {
      animation: wave 1.2s ease-in-out infinite;
    }
    @keyframes wave {
      0%, 100% { height: 8px; }
      50% { height: 32px; }
    }
    .bottom-sheet-up {
      animation: slideUp 0.5s cubic-bezier(0.32, 0.72, 0, 1) forwards;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body-md overflow-hidden">
<!-- Background Layer (Hub Screen Placeholder) -->
<div class="fixed inset-0 z-0">
<!-- TopAppBar Shell -->
<header class="fixed top-0 w-full z-50 bg-surface flex justify-between items-center px-container-margin py-3 w-full">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-surface-container-high overflow-hidden border border-outline-variant">
<img alt="Avatar" class="w-full h-full object-cover" data-alt="A professional high-quality headshot of a diverse young entrepreneur smiling warmly. The lighting is soft and natural, emphasizing a modern fintech aesthetic. The background is a clean, minimalist office space with soft-focus plants and neutral tones to match a corporate yet approachable brand identity." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDip0yPojf3VUaq0M7gBN3ZLbKC5j8vMJsLMKMT6ab-hPSaSagzgVvnL58jPuv0rXc4rf4biL9qNiJzrlaZf3lLwcxxGQVh1cf1WaHu0rZrULMSitUpFbekqgAmNdEUTq7szqOoArmQr-ZMKpQhtOuCp_cYHURHjmG3h0EN4vAqApU3tZCH7i_zzr-v5o5CqidxTxrjp8nRizCiF7qLfmCVJa-5eAtYL8bjcoC1EjljtrgdEEhk7V_JHRDjs3z4a6s5uMsK1ob4was"/>
</div>
<span class="font-display-lg-mobile text-display-lg-mobile text-primary">Kinetic</span>
</div>
<button class="material-symbols-outlined text-primary p-2 hover:bg-surface-container-high transition-colors rounded-full" data-icon="notifications">notifications</button>
</header>
<!-- Background Content: Mock Hub Grid -->
<main class="pt-20 px-container-margin space-y-6 opacity-40">
<div class="grid grid-cols-4 gap-card-gap">
<div class="flex flex-col items-center gap-2 p-3 bg-surface-container-lowest rounded-xl shadow-sm">
<div class="w-12 h-12 rounded-full bg-secondary-fixed flex items-center justify-center">
<span class="material-symbols-outlined text-on-secondary-fixed" data-icon="account_balance_wallet">account_balance_wallet</span>
</div>
<span class="text-label-sm font-label-sm">Wealth</span>
</div>
<div class="flex flex-col items-center gap-2 p-3 bg-surface-container-lowest rounded-xl shadow-sm">
<div class="w-12 h-12 rounded-full bg-secondary-fixed flex items-center justify-center">
<span class="material-symbols-outlined text-on-secondary-fixed" data-icon="show_chart">show_chart</span>
</div>
<span class="text-label-sm font-label-sm">Stocks</span>
</div>
<div class="flex flex-col items-center gap-2 p-3 bg-surface-container-lowest rounded-xl shadow-sm">
<div class="w-12 h-12 rounded-full bg-secondary-fixed flex items-center justify-center">
<span class="material-symbols-outlined text-on-secondary-fixed" data-icon="savings">savings</span>
</div>
<span class="text-label-sm font-label-sm">Vault</span>
</div>
<div class="flex flex-col items-center gap-2 p-3 bg-surface-container-lowest rounded-xl shadow-sm">
<div class="w-12 h-12 rounded-full bg-secondary-fixed flex items-center justify-center">
<span class="material-symbols-outlined text-on-secondary-fixed" data-icon="receipt_long">receipt_long</span>
</div>
<span class="text-label-sm font-label-sm">Bills</span>
</div>
</div>
<div class="grid grid-cols-2 gap-card-gap">
<div class="bg-surface-container-lowest rounded-xl p-4 shadow-sm border border-outline-variant/30">
<div class="h-24 bg-surface-container rounded-lg mb-3"></div>
<p class="font-body-md text-on-surface">Gold Standard</p>
<p class="text-label-sm text-on-surface-variant">Invest from $1.00</p>
</div>
<div class="bg-surface-container-lowest rounded-xl p-4 shadow-sm border border-outline-variant/30">
<div class="h-24 bg-surface-container rounded-lg mb-3"></div>
<p class="font-body-md text-on-surface">Crypto Hub</p>
<p class="text-label-sm text-on-surface-variant">Top Movers Today</p>
</div>
</div>
</main>
</div>
<!-- 30% Black Scrim -->
<div class="fixed inset-0 bg-black/30 z-40 backdrop-blur-[2px]"></div>
<!-- Intent Capture Bottom Sheet -->
<div class="fixed bottom-0 left-0 right-0 h-[65%] bg-surface-container-lowest rounded-t-[32px] z-50 shadow-2xl bottom-sheet-up flex flex-col items-center overflow-hidden">
<!-- Floating Orange Orb -->
<div class="absolute -top-6 w-12 h-12 bg-primary-container rounded-full orb-glow flex items-center justify-center border-4 border-surface-container-lowest z-50">
<div class="w-2 h-2 bg-white rounded-full animate-pulse"></div>
</div>
<!-- Drag Handle -->
<div class="w-12 h-1.5 bg-outline-variant/50 rounded-full mt-6 mb-8"></div>
<div class="w-full px-container-margin flex-1 flex flex-col">
<!-- Header -->
<h2 class="font-headline-md text-headline-md text-center text-on-surface mb-10">What do you want to do?</h2>
<!-- Voice Waveform -->
<div class="flex items-center justify-center gap-1.5 h-16 mb-12">
<div class="waveform-bar w-1 bg-primary-container rounded-full" style="animation-delay: 0.1s;"></div>
<div class="waveform-bar w-1 bg-primary rounded-full" style="animation-delay: 0.3s;"></div>
<div class="waveform-bar w-1 bg-primary-container rounded-full" style="animation-delay: 0.5s;"></div>
<div class="waveform-bar w-1 bg-primary rounded-full" style="animation-delay: 0.2s;"></div>
<div class="waveform-bar w-1 bg-primary-container rounded-full" style="animation-delay: 0.4s;"></div>
<div class="waveform-bar w-1 bg-primary rounded-full" style="animation-delay: 0.6s;"></div>
<div class="waveform-bar w-1 bg-primary-container rounded-full" style="animation-delay: 0.1s;"></div>
</div>
<!-- User Input State -->
<div class="mb-8">
<div class="bg-surface-container-low rounded-2xl p-4 flex items-center border border-outline-variant/30">
<span class="text-body-lg font-body-lg text-primary mr-2">I want to buy gold.</span>
<div class="w-0.5 h-6 bg-primary animate-pulse"></div>
</div>
</div>
<!-- Suggested Chips -->
<div class="flex flex-wrap gap-2 mb-10 justify-center">
<button class="px-4 py-2 bg-surface-container-high hover:bg-surface-container-highest transition-colors text-on-surface-variant text-label-sm font-label-sm rounded-full border border-outline-variant/20">Pay a bill</button>
<button class="px-4 py-2 bg-surface-container-high hover:bg-surface-container-highest transition-colors text-on-surface-variant text-label-sm font-label-sm rounded-full border border-outline-variant/20">Transfer money</button>
<button class="px-4 py-2 bg-primary-container text-white text-label-sm font-label-sm rounded-full shadow-sm">Buy gold</button>
<button class="px-4 py-2 bg-surface-container-high hover:bg-surface-container-highest transition-colors text-on-surface-variant text-label-sm font-label-sm rounded-full border border-outline-variant/20">Open a savings goal</button>
</div>
<!-- Input Field Shell -->
<div class="mt-auto pb-10 w-full">
<div class="relative flex items-center">
<input class="w-full h-14 bg-surface-container-low border-none rounded-full px-6 py-4 text-body-md focus:ring-2 focus:ring-primary-container/30 transition-all outline-none pr-14" placeholder="Type or speak your goal." readonly="" type="text"/>
<div class="absolute right-3 w-10 h-10 bg-primary-container rounded-full flex items-center justify-center text-white cursor-pointer active:scale-95 transition-transform">
<span class="material-symbols-outlined" data-icon="mic" style="font-variation-settings: 'FILL' 1;">mic</span>
</div>
</div>
</div>
</div>
</div>
<!-- Bottom Nav (Suppressed for focused task, but kept structure for context) -->
<nav class="fixed bottom-0 w-full z-50 rounded-t-xl flex justify-around items-center h-16 px-4 pb-safe bg-surface-container-lowest shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.04)] pointer-events-none opacity-20">
<div class="flex flex-col items-center justify-center text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="swap_horiz">swap_horiz</span>
<span class="font-label-sm text-label-sm">Payment</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="flower">local_florist</span>
<span class="font-label-sm text-label-sm">Home</span>
</div>
<div class="flex flex-col items-center justify-center text-primary font-bold">
<span class="material-symbols-outlined" data-icon="grid_view" style="font-variation-settings: 'FILL' 1;">grid_view</span>
<span class="font-label-sm text-label-sm">Hub</span>
</div>
</nav>
<script>
    // Micro-interaction for the input text mimicry
    document.addEventListener('DOMContentLoaded', () => {
      const bars = document.querySelectorAll('.waveform-bar');
      bars.forEach(bar => {
        bar.style.height = (Math.random() * 30 + 10) + 'px';
        setInterval(() => {
          bar.style.height = (Math.random() * 40 + 8) + 'px';
        }, 300);
      });
    });
  </script>
</body></html>
