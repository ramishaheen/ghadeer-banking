<style>
        @keyframes pulse-glow {
            0% { transform: scale(1); opacity: 0.6; filter: blur(40px); }
            50% { transform: scale(1.1); opacity: 0.8; filter: blur(60px); }
            100% { transform: scale(1); opacity: 0.6; filter: blur(40px); }
        }
        @keyframes float-orb {
            0% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-10px) scale(1.05); }
            100% { transform: translateY(0px) scale(1); }
        }
        @keyframes wave-animation {
            0% { height: 8px; }
            50% { height: 32px; }
            100% { height: 8px; }
        }
        .kinetic-glow {
            background: radial-gradient(circle, #DA532C 0%, rgba(218, 83, 44, 0) 70%);
            animation: pulse-glow 3s infinite ease-in-out;
        }
        .orb-container {
            animation: float-orb 4s infinite ease-in-out;
        }
        .voice-bar {
            animation: wave-animation 1.2s infinite ease-in-out;
        }
        .glass-panel {
            background: rgba(42, 42, 42, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .safe-pb {
            padding-bottom: env(safe-area-inset-bottom);
        }
    </style>
