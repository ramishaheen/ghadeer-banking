<body class="bg-background text-on-background font-body-md text-body-md antialiased min-h-screen flex flex-col">
<!-- Top AppBar (From Shared Components) -->
<header class="fixed top-0 w-full z-50 bg-surface dark:bg-surface-dim flex justify-between items-center px-container-margin py-3">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full overflow-hidden border-2 border-primary-container">
<img alt="User Profile" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAHOqkAdyaSbjMDx4N48zPwgqVNftdIDSDxet4QK_rtt3ycJCsDsNcpJIXVVmWD2Sww-pykgHV9qgQm0INW3bNLpua0-kDT_ZJdKVZ_EsfO8vj1pW6AdSlnkqVadP1f9YobUSnUPI7FtzOFhN-oxmJ2EiVVupFq_Pl5s2_SB_4uv8gaXLJCgFSipNvu-nRpVB_BU17o5jPKmrueE0imCV6vF4WNI7JisGuYP20x5jq4TvQYclqNwtD4SkKxumW7KtNJsfE_LxHjKOw">
</div>
<h1 class="font-display-lg-mobile text-display-lg-mobile text-primary dark:text-inverse-primary">Kinetic</h1>
</div>
<button class="material-symbols-outlined text-primary dark:text-inverse-primary hover:bg-surface-container-high dark:hover:bg-surface-container-highest transition-colors p-2 rounded-full active:scale-95 transition-transform duration-150" data-icon="notifications">notifications</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow pt-20 pb-24 px-container-margin">
<!-- Progress Indicator -->
<div class="mb-8">
<div class="flex justify-between items-end mb-2">
<p class="font-label-sm text-label-sm text-on-surface-variant">Step 3 of 5</p>
<p class="font-label-sm text-label-sm text-primary font-bold">Personal Details</p>
</div>
<div class="w-full h-2 bg-surface-container rounded-full overflow-hidden">
<div class="h-full bg-primary-container w-3/5 rounded-full transition-all duration-500"></div>
</div>
</div>
<!-- Form Section -->
<div class="space-y-6">
<section class="bg-surface-container-lowest p-element-padding rounded-xl shadow-sm border border-surface-variant/30">
<h2 class="font-headline-md text-headline-md mb-4 text-on-surface">Identification</h2>
<div class="space-y-4">
<div class="flex flex-col gap-1">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-1">Full Legal Name</label>
<input class="bg-surface-container-low border-none rounded-lg p-3 text-on-surface-variant font-body-lg text-body-lg cursor-not-allowed" disabled="" type="text" value="Alex Rivera">
</div>
<div class="flex flex-col gap-1">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-1">Date of Birth</label>
<input class="bg-surface-container-low border-none rounded-lg p-3 text-on-surface-variant font-body-lg text-body-lg cursor-not-allowed" disabled="" type="text" value="May 14, 1992">
</div>
</div>
</section>
<!-- Spotlighted Marital Status Section -->
<section class="relative z-[70] bg-surface-container-lowest p-element-padding rounded-xl shadow-lg spotlight" id="marital-status-section">
<h2 class="font-headline-md text-headline-md mb-4 text-on-surface">Marital Status</h2>
<div class="grid grid-cols-2 gap-3">
<!-- Single -->
<label class="flex items-center justify-between p-4 rounded-xl border-2 border-surface-variant bg-surface cursor-pointer hover:border-primary-container/50 transition-all">
<span class="font-body-lg text-body-lg">Single</span>
<input class="w-5 h-5 text-primary focus:ring-primary border-outline" name="marital_status" type="radio" value="single">
</label>
<!-- Married (Selected Focus) -->
<label class="flex items-center justify-between p-4 rounded-xl border-2 border-primary-container bg-secondary-container/20 cursor-pointer shadow-md transition-all">
<span class="font-body-lg text-body-lg font-bold text-primary">Married</span>
<input checked="" class="w-5 h-5 text-primary focus:ring-primary border-primary" name="marital_status" type="radio" value="married">
</label>
<!-- Divorced -->
<label class="flex items-center justify-between p-4 rounded-xl border-2 border-surface-variant bg-surface cursor-pointer hover:border-primary-container/50 transition-all">
<span class="font-body-lg text-body-lg">Divorced</span>
<input class="w-5 h-5 text-primary focus:ring-primary border-outline" name="marital_status" type="radio" value="divorced">
</label>
<!-- Widowed -->
<label class="flex items-center justify-between p-4 rounded-xl border-2 border-surface-variant bg-surface cursor-pointer hover:border-primary-container/50 transition-all">
<span class="font-body-lg text-body-lg">Widowed</span>
<input class="w-5 h-5 text-primary focus:ring-primary border-outline" name="marital_status" type="radio" value="widowed">
</label>
</div>
</section>
<section class="bg-surface-container-lowest p-element-padding rounded-xl shadow-sm border border-surface-variant/30 opacity-50 pointer-events-none transition-opacity duration-300">
<h2 class="font-headline-md text-headline-md mb-4 text-on-surface">Spouse Information</h2>
<div class="space-y-4">
<div class="flex flex-col gap-1">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-1">Spouse's Full Name</label>
<input class="bg-surface-container-low border-none rounded-lg p-3 text-on-surface-variant font-body-lg text-body-lg italic" placeholder="Entering after status selection..." type="text">
</div>
</div>
</section>
</div>
<!-- Next Action Button -->
<div class="mt-10 flex justify-end">
<button class="bg-primary-container text-white px-10 py-4 rounded-full font-headline-md text-headline-md shadow-lg active:scale-95 transition-transform hover:brightness-110">
                Next
            </button>
</div>
</main>
<!-- AI Orb Interaction Layer -->
<div class="fixed inset-0 z-[65] pointer-events-none">
<div class="absolute bottom-32 left-1/2 -translate-x-1/2 flex flex-col items-center gap-4 w-[85%] max-w-md pointer-events-auto">
<!-- Glassmorphism Bubble -->
<div class="bg-white/90 backdrop-blur-md p-4 rounded-2xl shadow-xl border border-white/20 orb-float relative">
<!-- Orb Graphic -->
<div class="absolute -top-12 left-1/2 -translate-x-1/2 w-16 h-16 rounded-full bg-gradient-to-tr from-primary to-primary-fixed-dim shadow-[0_0_20px_rgba(160,65,0,0.4)] flex items-center justify-center">
<div class="w-8 h-8 rounded-full bg-white/20 animate-pulse"></div>
</div>
<p class="text-on-background font-body-lg text-body-lg text-center mt-4">Please provide your marital status to ensure accurate record keeping. If applicable, complete the spouse information section below.</p>
<!-- Tooltip arrow -->
<div class="absolute -bottom-2 left-1/2 -translate-x-1/2 w-4 h-4 bg-white/90 rotate-45 border-r border-b border-white/20"></div>
</div>
</div>
</div>
<!-- Scrim (Inactive components darkened) -->
<div class="fixed inset-0 z-50 scrim-overlay pointer-events-none"></div>
<!-- Nav Suppressed (Linear Transactional Flow) -->
<script>
        // Micro-interaction for radio selections
        const radioLabels = document.querySelectorAll('label');
        radioLabels.forEach(label => {
            label.addEventListener('click', () => {
                radioLabels.forEach(l => {
                    l.classList.remove('border-primary-container', 'bg-secondary-container/20', 'shadow-md');
                    l.classList.add('border-surface-variant', 'bg-surface');
                    l.querySelector('span').classList.remove('font-bold', 'text-primary');
                });
                label.classList.remove('border-surface-variant', 'bg-surface');
                label.classList.add('border-primary-container', 'bg-secondary-container/20', 'shadow-md');
                label.querySelector('span').classList.add('font-bold', 'text-primary');
            });
        });
    </script>




</body></html>
